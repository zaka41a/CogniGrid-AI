global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway:8080']
    metrics_path: '/actuator/prometheus'

  - job_name: 'ingestion'
    static_configs:
      - targets: ['ingestion:8001']
    metrics_path: '/metrics'

  - job_name: 'graph'
    static_configs:
      - targets: ['graph:8002']
    metrics_path: '/metrics'

  - job_name: 'ai-engine'
    static_configs:
      - targets: ['ai-engine:8003']
    metrics_path: '/metrics'

  - job_name: 'graphrag'
    static_configs:
      - targets: ['graphrag:8004']
    metrics_path: '/metrics'

  - job_name: 'agent'
    static_configs:
      - targets: ['agent:8005']
    metrics_path: '/metrics'

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
