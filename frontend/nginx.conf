server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA: route every unknown path back to index.html so client-side
    # routing (React Router) works on page reload / deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets, never cache index.html.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
