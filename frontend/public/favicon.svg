<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="48" height="48" rx="10" fill="#0F1117"/>
  <defs>
    <linearGradient id="g" x1="24" y1="6" x2="24" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
  </defs>
  <!-- Grid lines horizontal -->
  <line x1="6"  y1="6"  x2="24" y2="6"  stroke="#3B82F6" stroke-width="1" stroke-opacity="0.22"/>
  <line x1="24" y1="6"  x2="42" y2="6"  stroke="#3B82F6" stroke-width="1" stroke-opacity="0.22"/>
  <line x1="6"  y1="24" x2="24" y2="24" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.22"/>
  <line x1="24" y1="24" x2="42" y2="24" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.22"/>
  <line x1="6"  y1="42" x2="24" y2="42" stroke="#22C55E" stroke-width="1" stroke-opacity="0.22"/>
  <line x1="24" y1="42" x2="42" y2="42" stroke="#22C55E" stroke-width="1" stroke-opacity="0.22"/>
  <!-- Grid lines vertical -->
  <line x1="6"  y1="6"  x2="6"  y2="24" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.22"/>
  <line x1="6"  y1="24" x2="6"  y2="42" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.22"/>
  <line x1="24" y1="6"  x2="24" y2="24" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.22"/>
  <line x1="24" y1="24" x2="24" y2="42" stroke="#22C55E" stroke-width="1" stroke-opacity="0.22"/>
  <line x1="42" y1="6"  x2="42" y2="24" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.22"/>
  <line x1="42" y1="24" x2="42" y2="42" stroke="#22C55E" stroke-width="1" stroke-opacity="0.22"/>
  <!-- Lightning bolt spark -->
  <polyline
    points="24,6 6,24 42,24 24,42"
    fill="none"
    stroke="url(#g)"
    stroke-width="2.8"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Background nodes subtle -->
  <circle cx="6"  cy="6"  r="2.5" fill="#3B82F6" opacity="0.32"/>
  <circle cx="42" cy="6"  r="2.5" fill="#3B82F6" opacity="0.32"/>
  <circle cx="24" cy="24" r="2.5" fill="#3B82F6" opacity="0.32"/>
  <circle cx="6"  cy="42" r="2.5" fill="#22C55E" opacity="0.32"/>
  <circle cx="42" cy="42" r="2.5" fill="#22C55E" opacity="0.32"/>
  <!-- Bolt nodes prominent -->
  <circle cx="24" cy="6"  r="4.2" fill="url(#g)"/>
  <circle cx="6"  cy="24" r="4.2" fill="url(#g)"/>
  <circle cx="42" cy="24" r="4.2" fill="url(#g)"/>
  <circle cx="24" cy="42" r="4.2" fill="url(#g)"/>
</svg>
